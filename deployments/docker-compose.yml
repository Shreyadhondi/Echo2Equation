services:
  db:
    image: postgres:16
    container_name: echo2eq-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - storage:/storage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: echo2eq-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: echo2eq-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
      - storage:/app/storage
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.frontend
    container_name: echo2eq-frontend
    restart: unless-stopped
    ports:
      - "5500:80"

  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: echo2eq-airflow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: echo2equation_airflow_secret
      AIRFLOW_UID: 50000
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Echo
      --lastname Equation
      --role Admin
      --email admin@example.com
      --password admin || true &&
      airflow webserver
      "

volumes:
  pgdata:
  storage: