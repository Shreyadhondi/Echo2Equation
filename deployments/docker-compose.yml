services:
  db:
    image: postgres:16
    container_name: echo2eq-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - storage:/storage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: echo2eq-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: echo2eq-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
      - storage:/app/storage
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.frontend
    container_name: echo2eq-frontend
    restart: unless-stopped
    ports:
      - "5500:80"

volumes:
  pgdata:
  storage:
